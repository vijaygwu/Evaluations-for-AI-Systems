name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The heavy/optional libraries (openai, anthropic, torch,
      # sentence-transformers, ragas, ...) are lazy-imported, so the offline
      # test suite needs only the lightweight numerical deps. Live API usage
      # needs the full requirements.txt + API keys (see README).
      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy

      - name: Syntax check (py_compile every module)
        run: python -m py_compile $(find . -name '*.py' -not -path './.git/*')

      - name: Import smoke test (all modules import without heavy deps)
        run: |
          python - <<'PY'
          import importlib, pkgutil
          pkgs = ["ch03_graders", "ch04_statistics", "ch08_agents",
                  "ch13_safety", "ch23_rag", "utils"]
          n = 0
          for pkg in pkgs:
              importlib.import_module(pkg); n += 1
              for m in pkgutil.iter_modules([pkg]):
                  importlib.import_module(f"{pkg}.{m.name}"); n += 1
          print(f"OK: imported {n} modules")
          PY

      - name: Execution tests (mocked LLM + embedder, no API keys)
        run: python tests/test_execution.py
